##############################################
# CarBor - Docker Compose
# PostgreSQL + Redis + Bot
# Ishga tushirish: docker-compose up -d
##############################################

version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: carbor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: carbor_db
      POSTGRES_USER: carbor
      POSTGRES_PASSWORD: carbor_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U carbor -d carbor_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis (Scraper <-> Bot real-time aloqa)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: carbor-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Bot Core (Node.js)
  # Production'da ishlatiladi
  # ============================================
  bot:
    build:
      context: ./apps/bot-core
      dockerfile: Dockerfile
    container_name: carbor-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://carbor:carbor_secret@postgres:5432/carbor_db
      REDIS_URL: redis://redis:6379
      BOT_ADMIN_ID: ${BOT_ADMIN_ID}
      NODE_ENV: production

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
